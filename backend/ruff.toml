target-version = "py312"
line-length = 100
src = ["app", "tests"]

[lint]
select = ["E", "W", "F", "I", "B", "UP"]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # function calls in default args (FastAPI Depends pattern)
    "UP007",  # keep Optional for Phase 0 clarity
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"

